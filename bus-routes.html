<!DOCTYPE html>
<html lang="kn">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rudra Parayana - Bus Routes</title>
    <link rel="icon" type="image/x-icon" href="om.ico">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

                "secondary": "#ad2c00",
                "on-tertiary-container": "#544200",
                "surface-container-highest": "#e4e2e1",
                "secondary-container": "#d83900",
                "surface-container": "#f0eded",
                "on-error": "#ffffff",
                "secondary-fixed": "#ffdbd1",
                "tertiary-fixed-dim": "#e9c349",
                "on-surface-variant": "#554336",
                "primary-fixed-dim": "#ffb77a",
                "surface-container-high": "#eae8e7",
                "on-background": "#1b1c1c",
                "on-tertiary-fixed": "#241a00",
                "on-error-container": "#93000a",
                "on-secondary-container": "#fffbff",
                "surface-container-low": "#f6f3f2",
                "on-secondary": "#ffffff",
                "primary-container": "#ff9933",
                "error": "#ba1a1a",
                "outline-variant": "#dbc2b0",
                "tertiary-container": "#d3ae36",
                "tertiary-fixed": "#ffe088",
                "on-primary": "#ffffff",
                "inverse-surface": "#303030",
                "on-secondary-fixed-variant": "#872000",
                "surface-dim": "#dcd9d9",
                "inverse-on-surface": "#f3f0f0",
                "background": "#fbf9f8",
                "on-primary-fixed": "#2e1500",
                "on-tertiary-fixed-variant": "#574500",
                "on-surface": "#1b1c1c",
                "surface-container-lowest": "#ffffff",
                "on-secondary-fixed": "#3b0900",
                "inverse-primary": "#ffb77a",
                "surface-variant": "#e4e2e1",
                "on-primary-fixed-variant": "#6d3a00",
                "secondary-fixed-dim": "#ffb5a0",
                "on-primary-container": "#693800",
                "primary-fixed": "#ffdcc2",
                "surface-bright": "#fbf9f8",
                "error-container": "#ffdad6",
                "surface": "#fbf9f8"
            },
            "borderRadius": {

            "spacing": {

                "stack-lg": "2.5rem",

                "stack-xs": "0.5rem"
            },
            "fontFamily": {
                "body-md": ["Inter"],
                "chant-text": ["Inter"],
                "body-lg": ["Inter"],
                "label-lg": ["Inter"],
                "headline-lg": ["Inter"],
                "headline-lg-mobile": ["Inter"],
                "headline-sm": ["Inter"],
                "label-md": ["Inter"],
                "headline-md": ["Inter"]
            },
            "fontSize": {
                "body-md": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                "chant-text": ["24px", {"lineHeight": "40px", "fontWeight": "500"}],
                "body-lg": ["20px", {"lineHeight": "32px", "fontWeight": "400"}],
                "label-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                "headline-lg": ["34px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                "headline-sm": ["22px", {"lineHeight": "30px", "fontWeight": "600"}],
                "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.04em", "fontWeight": "600"}],
                "headline-md": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
    <style>
        body {
            background-color: #fbf9f8;
            color: #1b1c1c;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .touch-active:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body class="font-body-md text-body-md pb-32">

    <!-- TopAppBar -->
    <header class="bg-surface-container-lowest border-b-2 border-primary-container w-full fixed top-0 z-50">
        <div class="flex justify-between items-center px-4 h-16">
            <div class="flex items-center gap-3">
                <a href="index.html" class="touch-active flex items-center justify-center w-10 h-10 rounded-full bg-surface-container">
                    <span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
                </a>
                <h1 class="text-xl font-bold text-primary">Bus Routes</h1>
            </div>
            <div class="flex items-center gap-2">
                <div class="text-right">
                    <p id="user-name" class="text-sm font-medium text-on-surface">Welcome</p>
                    <p id="user-id" class="text-xs text-on-surface-variant hidden"></p>
                </div>
                <a href="profile.html" class="touch-active flex items-center justify-center w-12 h-12 rounded-full bg-primary-container overflow-hidden" id="profile-link">
                    <span class="material-symbols-outlined text-on-primary-container" data-icon="account_circle">account_circle</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Canvas -->
    <main id="app-content" class="pt-20 px-margin-mobile space-y-stack-lg max-w-2xl mx-auto">
        <!-- Outstation Events List -->
        <section>
            <div id="outstation-events-list" class="space-y-4">
                <p class="text-on-surface-variant">Loading outstation events...</p>
            </div>
        </section>
    </main>

    <!-- Help Button (Floating) -->
    <button id="help-btn" class="fixed bottom-32 right-4 z-40 flex items-center justify-center gap-2 w-auto h-14 px-4 rounded-full bg-secondary-container text-on-secondary-container shadow-lg touch-active">
        <span class="material-symbols-outlined" data-icon="help" style="font-variation-settings: 'FILL' 1;">help</span>
        <span class="font-label-lg text-label-lg">ಸಹಾಯ</span>
    </button>

    <!-- BottomNavBar - Mobile First with Large Touch Targets -->
    <nav class="fixed bottom-0 w-full z-50 bg-surface-container border-t-2 border-outline-variant shadow-lg">
        <div class="flex justify-around items-center px-2 py-3 safe-area-inset-bottom">
            <!-- Home -->
            <a class="flex flex-col items-center justify-center w-20 h-20 rounded-xl transition-all duration-150 touch-active" href="index.html">
                <span class="material-symbols-outlined text-3xl text-on-surface-variant mb-1" data-icon="home">home</span>
                <span class="font-label-lg text-label-lg text-on-surface-variant">Home</span>
            </a>
            <!-- Events -->
            <a class="flex flex-col items-center justify-center w-20 h-20 rounded-xl transition-all duration-150 touch-active" href="events.html">
                <span class="material-symbols-outlined text-3xl text-on-surface-variant mb-1" data-icon="event">event</span>
                <span class="font-label-lg text-label-lg text-on-surface-variant">Events</span>
            </a>
            <!-- Bus Routes (Active) -->
            <a class="flex flex-col items-center justify-center w-20 h-20 rounded-xl bg-primary-container text-on-primary-container transition-all duration-150 touch-active" href="bus-routes.html">
                <span class="material-symbols-outlined text-3xl text-on-primary-container mb-1" data-icon="directions_bus" style="font-variation-settings: 'FILL' 1;">directions_bus</span>
                <span class="font-label-lg text-label-lg text-on-primary-container">Bus</span>
            </a>
            <!-- Essentials -->
            <a class="flex flex-col items-center justify-center w-20 h-20 rounded-xl transition-all duration-150 touch-active" href="essentials.html">
                <span class="material-symbols-outlined text-3xl text-on-surface-variant mb-1" data-icon="checklist">checklist</span>
                <span class="font-label-lg text-label-lg text-on-surface-variant">Items</span>
            </a>
        </div>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // State Management
        const state = {
            events: [],
            rsvps: {},
            busRoutes: {},
            user: null
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            // Check authentication state
            firebaseAuth.onAuthStateChanged(user => {
                if (user) {
                    state.user = user;
                    loadUserData(user);
                    loadEvents();
                    loadRsvps();
                    loadBusRoutes();
                } else {
                    // No user - redirect to login
                    window.location.href = 'login.html';
                }
            });
        });

        // Load user data
        function loadUserData(user) {
            // Set Google data as fallback
            document.getElementById('user-name').textContent = user.displayName || user.email || 'Devotee';
            if (user.photoURL) {
                document.getElementById('profile-link').innerHTML = `<img src="${user.photoURL}" class="w-full h-full rounded-full object-cover" alt="Profile">`;
            }
            
            // Listen to user data from Firestore in real-time
            if (typeof firebaseDb !== 'undefined' && firebaseDb) {
                try {
                    firebaseDb.collection('users').doc(user.uid).onSnapshot(doc => {
                        if (doc.exists) {
                            const userData = doc.data();
                            // Update user name in header
                            document.getElementById('user-name').textContent = userData.name || user.displayName || user.email || 'Devotee';
                            // Show user ID
                            if (userData.userId) {
                                document.getElementById('user-id').textContent = `ID: ${userData.userId}`;
                                document.getElementById('user-id').classList.remove('hidden');
                            }
                            // Show profile picture in header
                            if (userData.photoURL) {
                                document.getElementById('profile-link').innerHTML = `<img src="${userData.photoURL}" class="w-full h-full rounded-full object-cover" alt="Profile">`;
                            }
                        }
                    });
                } catch (error) {
                    console.log('Firestore not available, using Google data');
                }
            }
        }

        // Load events from Firestore
        function loadEvents() {
            try {
                firebaseDb.collection('events').orderBy('date', 'desc').onSnapshot(snapshot => {
                    state.events = [];
                    snapshot.forEach(doc => {
                        state.events.push({ id: doc.id, ...doc.data() });
                    });
                    renderOutstationEvents();
                });
            } catch (error) {
                console.log('Firestore not available, using demo data');
                // Demo data
                state.events = [
                    { id: 'demo-event-1', title: 'Rudra Abhishekam', date: '2026-07-15', time: '06:00', type: 'Outstation', location: 'ISKCON Temple, Bangalore' }
                ];
                renderOutstationEvents();
            }
        }

        // Load RSVPs from Firestore
        function loadRsvps() {
            if (!state.user) return;
            
            try {
                firebaseDb.collection('rsvps').onSnapshot(snapshot => {
                    state.rsvps = {};
                    snapshot.forEach(doc => {
                        state.rsvps[doc.id] = doc.data();
                    });
                    renderOutstationEvents();
                });
            } catch (error) {
                console.log('Firestore not available, using demo data');
                state.rsvps = {};
            }
        }

        // Load bus routes from Firestore
        function loadBusRoutes() {
            try {
                firebaseDb.collection('busRoutes').onSnapshot(snapshot => {
                    state.busRoutes = {};
                    snapshot.forEach(doc => {
                        state.busRoutes[doc.id] = doc.data().buses || [];
                    });
                    renderOutstationEvents();
                });
            } catch (error) {
                console.log('Firestore not available, using demo data');
                state.busRoutes = {};
            }
        }

        // Render outstation events on bus routes page
        function renderOutstationEvents() {
            const outstationEventsList = document.getElementById('outstation-events-list');
            
            // Filter only outstation events
            const outstationEvents = state.events.filter(e => e.type === 'Outstation');
            
            if (outstationEvents.length === 0) {
                outstationEventsList.innerHTML = '<p class="text-on-surface-variant">No outstation events found.</p>';
                return;
            }

            outstationEventsList.innerHTML = outstationEvents.map(e => {
                const userRsvp = state.rsvps[state.user.uid] && state.rsvps[state.user.uid][e.id];
                const isAttending = userRsvp && userRsvp.status === 'attending';
                
                // Get bus routes for this event
                const buses = state.busRoutes[e.id] || [];
                const allRoutes = [];
                buses.forEach(bus => {
                    if (bus.routes) {
                        bus.routes.forEach(route => {
                            allRoutes.push({ ...route, busName: bus.name });
                        });
                    }
                });
                
                // Sort routes by time
                allRoutes.sort((a, b) => {
                    const timeA = a.time || '';
                    const timeB = b.time || '';
                    return timeA.localeCompare(timeB);
                });
                
                // Check if user has selected a pickup point
                const hasSelectedPickup = userRsvp && userRsvp.pickupPoint;
                
                // Build routes HTML
                let routesHtml = '';
                if (allRoutes.length > 0 && isAttending) {
                    // Group routes by bus name
                    const routesByBus = {};
                    allRoutes.forEach(route => {
                        if (!routesByBus[route.busName]) {
                            routesByBus[route.busName] = [];
                        }
                        routesByBus[route.busName].push(route);
                    });
                    
                    routesHtml = `
                        <div class="mt-3 pt-3 border-t border-outline-variant">
                            <div class="flex justify-between items-center mb-2">
                                <p class="font-label-lg text-label-lg text-on-surface-variant">Bus Pickup Points:</p>
                                ${hasSelectedPickup ? `<button class="edit-pickup-btn touch-active text-primary font-label-md text-label-md" data-event-id="${e.id}">Edit</button>` : ''}
                            </div>
                            ${hasSelectedPickup ? `
                                <div class="mb-3">
                                    <p class="font-body-lg text-body-lg text-primary font-bold mb-2">Your Selected Pickup Point:</p>
                                    <div class="p-3 rounded-lg border-2 border-primary-container bg-primary-fixed-dim">
                                        <p class="font-body-lg text-body-lg text-on-surface">${allRoutes.find(r => r.id === userRsvp.pickupPoint)?.point || 'Unknown'}</p>
                                        <p class="font-label-md text-label-md text-on-surface-variant">${allRoutes.find(r => r.id === userRsvp.pickupPoint)?.time || ''} (${allRoutes.find(r => r.id === userRsvp.pickupPoint)?.busName || ''})</p>
                                    </div>
                                </div>
                            ` : `
                                ${Object.entries(routesByBus).map(([busName, routes]) => `
                                    <div class="mb-3">
                                        <p class="font-body-lg text-body-lg text-primary font-bold mb-2">${busName}</p>
                                        <div class="space-y-2" data-event-id="${e.id}">
                                            ${routes.map(route => `
                                                <label class="flex items-center gap-3 p-3 rounded-lg border-2 ${userRsvp && userRsvp.pickupPoint === route.id ? 'border-primary-container bg-primary-fixed-dim' : 'border-outline-variant bg-surface-container-lowest'} ${hasSelectedPickup ? 'opacity-70 cursor-not-allowed' : 'cursor-pointer'}">
                                                    <input type="radio" name="pickup-${e.id}" value="${route.id}" data-event-id="${e.id}" data-pickup-point="${route.id}" class="bus-pickup-radio w-5 h-5 text-primary-container" ${userRsvp && userRsvp.pickupPoint === route.id ? 'checked' : ''} ${hasSelectedPickup ? 'disabled' : ''}>
                                                    <div class="flex-1">
                                                        <p class="font-body-lg text-body-lg text-on-surface">${route.point}</p>
                                                        <p class="font-label-md text-label-md text-on-surface-variant">${route.time}</p>
                                                    </div>
                                                </label>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            `}
                        </div>
                    `;
                }
                
                return `
                    <div class="bg-surface-container-lowest border-2 border-primary-container rounded-xl p-6 shadow-sm" data-event-id="${e.id}">
                        <h4 class="font-bold text-primary text-lg mb-2">${e.title}</h4>
                        <p class="text-on-surface font-body-lg text-body-lg">${formatDate(e.date)} at ${e.time}</p>
                        <p class="text-on-surface-variant font-body-lg text-body-lg">${e.location}</p>
                        ${routesHtml}
                    </div>
                `;
            }).join('');

            // Add event listeners for bus pickup radio buttons
            document.querySelectorAll('.bus-pickup-radio').forEach(radio => {
                radio.addEventListener('change', function() {
                    const eventId = this.getAttribute('data-event-id');
                    const pickupPoint = this.value;
                    updatePickupPoint(eventId, pickupPoint);
                });
            });
            
            // Add event listeners for edit pickup buttons
            document.querySelectorAll('.edit-pickup-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const eventId = this.getAttribute('data-event-id');
                    // Remove the pickup point to allow re-selection
                    if (state.rsvps[state.user.uid] && state.rsvps[state.user.uid][eventId]) {
                        delete state.rsvps[state.user.uid][eventId].pickupPoint;
                    }
                    // Re-render to show the radio buttons
                    renderOutstationEvents();
                });
            });
        }
        
        // Update pickup point
        function updatePickupPoint(eventId, pickupPoint) {
            if (!state.user) return;
            
            const rsvpData = {
                ...state.rsvps[state.user.uid]?.[eventId],
                pickupPoint: pickupPoint
            };
            
            firebaseDb.collection('rsvps').doc(state.user.uid).set({
                [eventId]: rsvpData
            }, { merge: true });
        }

        // Show help modal
        function showHelpModal() {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4';
            modal.innerHTML = `
                <div class="bg-white rounded-xl p-6 w-full max-w-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-headline-sm text-headline-sm text-primary">Help & Support</h3>
                        <button id="close-help-modal" class="text-2xl text-on-surface-variant">&times;</button>
                    </div>
                    <div class="space-y-4">
                        <div class="p-4 bg-surface-container-high rounded-lg">
                            <h4 class="font-bold text-primary mb-2">Need Help?</h4>
                            <p class="text-on-surface font-body-lg text-body-lg">Contact an admin for assistance with:</p>
                            <ul class="list-disc list-inside text-on-surface font-body-lg text-body-lg mt-2 space-y-1">
                                <li>Event registration issues</li>
                                <li>Bus pickup point selection</li>
                                <li>Account or profile problems</li>
                                <li>Technical support</li>
                            </ul>
                        </div>
                        <div id="admins-list" class="space-y-2">
                            <p class="text-center text-on-surface-variant">Loading admins...</p>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('close-help-modal').addEventListener('click', () => {
                document.body.removeChild(modal);
            });
            
            // Fetch admin users from Firestore
            if (typeof firebaseDb !== 'undefined' && firebaseDb) {
                try {
                    firebaseDb.collection('users').where('role', '==', 'admin').onSnapshot(snapshot => {
                        const adminsList = document.getElementById('admins-list');
                        if (snapshot.empty) {
                            adminsList.innerHTML = '<p class="text-center text-on-surface-variant">No admins available</p>';
                            return;
                        }
                        
                        let html = '<p class="font-label-lg text-label-lg text-on-surface mb-2">Contact an Admin:</p>';
                        snapshot.forEach(doc => {
                            const admin = doc.data();
                            const phone = admin.phone || admin.email || 'N/A';
                            const name = admin.name || 'Admin';
                            html += `
                                <div class="p-3 bg-primary-fixed rounded-lg flex justify-between items-center">
                                    <span class="font-body-lg text-body-lg text-on-primary-fixed">${name}</span>
                                    <a href="tel:${phone}" class="text-primary font-bold text-body-lg">${phone}</a>
                                </div>
                            `;
                        });
                        adminsList.innerHTML = html;
                    });
                } catch (error) {
                    document.getElementById('admins-list').innerHTML = '<p class="text-center text-on-surface-variant">Unable to load admin contacts</p>';
                }
            }
        }
        
        // Add help button click handler
        document.getElementById('help-btn').addEventListener('click', showHelpModal);

        // Format date for display
        function formatDate(dateString) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }
    </script>
</body>
</html>
