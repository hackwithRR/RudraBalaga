    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // State
        const state = {
            user: null,
            userData: null
        };

        // Loading animation
        const tl = gsap.timeline();

        // 1. Text activation
        tl.to("#app-title", { opacity: 1, translateY: 0, duration: 1, ease: "power4.out" })
          
          // 2. Stroke layout drawing orchestration
          .to(".neon-line", {
              strokeDashoffset: 0,
              duration: 3.2,
              ease: "power2.inOut",
              stagger: 0.08,
              onUpdate: function() {
                  let progress = Math.floor(this.progress() * 100);
                  document.getElementById("bar-meter").style.width = progress + "%";
                  
                  if(progress > 20 && progress < 65) {
                      document.getElementById("load-state").textContent = "MANIFESTING DIVINE MATRIX";
                  } else if(progress >= 65) {
                      document.getElementById("load-state").textContent = "LOCKING AXIAL RADIALS";
                  }
              }
          }, "-=0.8");
        
        // 3. Mount centered backplane graphics
        tl.to("#final-trishul", {
            opacity: 1,
            duration: 0.5,
            ease: "power2.out",
            onStart: () => {
                document.getElementById("load-state").textContent = "TRISHUL MOUNTED";
            }
        }, "-=0.4")
        .to("#bindu", {
            opacity: 1,
            scale: 1,
            duration: 0.3,
            ease: "back.out(3)"
        }, "-=0.2");

        // 4. Force emission pulses
        tl.to("#shockwave", {
            opacity: 0.6,
            scale: 18,
            duration: 0.8,
            ease: "expo.out"
        })
        .to("#shiva-svg", {
            scale: 0.96,
            duration: 0.15
        }, "-=0.8");

        // 5. Unveil core product view shell
        tl.to("#loader-panel", {
            clipPath: "polygon(0% 0%, 100% 0%, 100% 0%, 0% 0%)",
            duration: 1.3,
            ease: "expo.inOut"
        })
        .to("#app-content", {
            opacity: 1,
            scale: 1,
            duration: 1.2,
            ease: "power3.out",
            onComplete: () => {
                document.getElementById("app-content").style.pointerEvents = "auto";
                document.getElementById("loader-panel").remove();
                initializeApp();
            }
        }, "-=1.0");

        // Initialize app
        function initializeApp() {
            // Check authentication state - STRICTLY require login
            firebaseAuth.onAuthStateChanged(user => {
                if (user) {
                    state.user = user;
                    // Listen to user data from Firestore in real-time
                    try {
                        firebaseDb.collection('users').doc(user.uid).onSnapshot(doc => {
                            if (doc.exists) {
                                state.userData = doc.data();
                                loadProfileData();
                            } else {
                                // User document doesn't exist yet
                                loadProfileData();
                            }
                        });
                    } catch (error) {
                        // If Firestore fails, use Google data
                        loadProfileData();
                    }
                } else {
                    // Redirect to login if not authenticated
                    window.location.href = 'login.html';
                }
            });
        }

        // Load profile data
        function loadProfileData() {
            // Pre-fill from Google user data
            if (state.user) {
                document.getElementById('profile-name').value = state.userData?.name || state.user.displayName || '';
                document.getElementById('profile-email').value = state.user.email || '';
            }
            // Load additional data from Firestore
            if (state.userData) {
                document.getElementById('profile-phone').value = state.userData.phone || '';
                document.getElementById('profile-dob').value = state.userData.dob || '';
                document.getElementById('profile-address').value = state.userData.address || '';
                // Load profile picture
                if (state.userData.photoURL) {
                    document.getElementById('profile-preview').innerHTML = `<img src="${state.userData.photoURL}" class="w-full h-full object-cover" alt="Profile">`;
                }
            }
        }

        // Setup form submit
        document.getElementById('profile-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const profileData = {
                name: document.getElementById('profile-name').value,
                phone: document.getElementById('profile-phone').value,
                dob: document.getElementById('profile-dob').value,
                address: document.getElementById('profile-address').value
            };
            
            if (state.user) {
                firebaseDb.collection('users').doc(state.user.uid).set({
                    ...state.userData,
                    ...profileData
                }, { merge: true }).then(() => {
                    alert('Profile saved successfully!');
                });
            }
        });

        // Setup profile picture change
        document.getElementById('change-pic-btn').addEventListener('click', function() {
            document.getElementById('profile-pic-input').click();
        });

        document.getElementById('profile-pic-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64 = event.target.result;
                    // Update preview
                    document.getElementById('profile-preview').innerHTML = `<img src="${base64}" class="w-full h-full object-cover" alt="Profile">`;
                    // Save to Firestore
                    if (state.user) {
                        // Get current user data or create empty object
                        const currentData = state.userData || {};
                        firebaseDb.collection('users').doc(state.user.uid).set({
                            ...currentData,
                            photoURL: base64
                        }, { merge: true }).then(() => {
                            // Update state after successful save
                            state.userData = { ...currentData, photoURL: base64 };
                        }).catch(error => {
                            console.error('Error saving photo:', error);
                        });
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        // Show help modal
        function showHelpModal() {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-4';
            modal.innerHTML = `
                <div class="bg-white rounded-xl p-6 w-full max-w-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-headline-sm text-headline-sm text-primary">Help & Support</h3>
                        <button id="close-help-modal" class="text-2xl text-on-surface-variant">&times;</button>
                    </div>
                    <div class="space-y-4">
                        <div class="p-4 bg-surface-container-high rounded-lg">
                            <h4 class="font-bold text-primary mb-2">Need Help?</h4>
                            <p class="text-on-surface font-body-lg text-body-lg">Contact an admin for assistance with:</p>
                            <ul class="list-disc list-inside text-on-surface font-body-lg text-body-lg mt-2 space-y-1">
                                <li>Profile update issues</li>
                                <li>Event registration problems</li>
                                <li>Bus pickup point selection</li>
                                <li>Technical support</li>
                            </ul>
                        </div>
                        <div id="admins-list" class="space-y-2">
                            <p class="text-center text-on-surface-variant">Loading admins...</p>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('close-help-modal').addEventListener('click', () => {
                document.body.removeChild(modal);
            });
            
            // Fetch admin users from Firestore
            if (typeof firebaseDb !== 'undefined' && firebaseDb) {
                try {
                    firebaseDb.collection('users').where('role', '==', 'admin').onSnapshot(snapshot => {
                        const adminsList = document.getElementById('admins-list');
                        if (snapshot.empty) {
                            adminsList.innerHTML = '<p class="text-center text-on-surface-variant">No admins available</p>';
                            return;
                        }
                        
                        let html = '<p class="font-label-lg text-label-lg text-on-surface mb-2">Contact an Admin:</p>';
                        snapshot.forEach(doc => {
                            const admin = doc.data();
                            const phone = admin.phone || admin.email || 'N/A';
                            const name = admin.name || 'Admin';
                            html += `
                                <div class="p-3 bg-primary-fixed rounded-lg flex justify-between items-center">
                                    <span class="font-body-lg text-body-lg text-on-primary-fixed">${name}</span>
                                    <a href="tel:${phone}" class="text-primary font-bold text-body-lg">${phone}</a>
                                </div>
                            `;
                        });
                        adminsList.innerHTML = html;
                    });
                } catch (error) {
                    document.getElementById('admins-list').innerHTML = '<p class="text-center text-on-surface-variant">Unable to load admin contacts</p>';
                }
            }
        }

    // Setup logout button
    document.getElementById('logout-btn').addEventListener('click', function() {
        // Clear demo mode data
        localStorage.removeItem('userPhone');
        localStorage.removeItem('userPin');
        
        // Sign out from Firebase
        if (typeof firebaseAuth !== 'undefined' && firebaseAuth) {
            firebaseAuth.signOut().then(() => {
                window.location.href = 'login.html';
            }).catch(() => {
                window.location.href = 'login.html';
            });
        } else {
            window.location.href = 'login.html';
        }
    });

    // Setup help button
    document.getElementById('help-btn').addEventListener('click', showHelpModal);
    </script>
</body>
</html>
